<!DOCTYPE html>
<html>
<head>

<title>Thêm tài liệu</title>

<link rel="stylesheet"
href="{{ url_for('static', filename='style.css') }}">

</head>
<body>

<div class="container">

<h2>Thêm tài liệu</h2>

<form method="POST" enctype="multipart/form-data">

<input
type="text"
name="title"
placeholder="Tên tài liệu"
required>

<input
type="text"
name="category"
placeholder="Thể loại"
required>

<input
type="file"
name="file">

<button type="submit">
Thêm
</button>

</form>

</div>

</body>
</html>
